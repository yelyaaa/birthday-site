<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фотолар ❤️</title>

    <style>
        /* 1. Настройки фона и страницы */
        body {
            background-image: url("fon2.PNG");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Чтобы контент шел сверху вниз */
            padding-top: 50px;
            font-family: 'Arial', sans-serif;
            color: white;
            overflow-x: hidden;
        }

        /* 2. Тот самый ИДЕАЛЬНЫЙ КОНТЕЙНЕР для видео */
        .video-container {
            width: 80%;
            max-width: 400px;
            margin: 30px auto;
            border-radius: 35px;    /* Скругление */
            overflow: hidden;       /* Срезает углы видео */
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            border: 3px solid rgba(255, 255, 255, 0.3);
            background-color: #000;
            transition: 0.3s;
        }

        .video-container:hover {
            transform: scale(1.02);
        }

        .video-container video {
            width: 100%;
            display: block;
            object-fit: cover;
        }

        /* 3. Стили для ссылок и деталей */
        h1 a, details a {
            color: white;
            text-decoration: none;
            font-size: 2rem;
        }

        details {
            margin: 20px;
            cursor: pointer;
            background: rgba(255,255,255,0.2);
            padding: 10px;
            border-radius: 15px;
        }

        /* Настройка панели управления в Safari/Chrome */
        video::-webkit-media-controls-panel {
            background-image: linear-gradient(transparent, rgba(0,0,0,0.7));
        }
    </style>
</head>
<body>
    <h1><a href="https://youtu.be/OdFQl0iZVbE?si=ne2YUcZxabcRderd">❤️</a></h1>
   <br>
    <div class="video-container">
        <video controls>
            <source src="video1.mp4" type="video/mp4">
        </video>
    </div>

    <details>
        <summary> ❤️</summary>
        <p><a href="https://youtu.be/jDkKWX1Pvqo?si=ceA_Cv1t1HOT-vsv">️seni syiemin❤️</a></p>
    </details>
    <br>
    <marquee scrollamount="7" behavior="scroll" direction="left"
             style="color: maroon; font-size: 40px; font-weight: bold; text-shadow: 2px 2px 10px rgba(255, 77, 109, 0.5); width: 100%;">
        men seni syiem, menin mangilik mahabbatym ❤️
    </marquee>
</body>
</html>
